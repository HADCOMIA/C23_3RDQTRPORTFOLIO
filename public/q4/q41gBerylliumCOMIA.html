<!DOCTYPE html>
<html>
    <head>
        <title>Q4 1st Graded</title>
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="1st Graded Exercise">
        <meta name="keywords" content="Movie Rating">
        <meta name="author" content="HA Comia">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            label {
                font-weight: bold;
                margin-left: 2rem;
                color:rgb(61, 61, 61);
            }

            fieldset  {
                width: 50%;
                margin: auto;
                margin-top: 5rem;
            }

            h3 {
                font-weight: bold;
                text-align: center
            }

            input  {
                width: 90%;
                margin-left: 2rem;
                font-weight: lighter;
            }

            select {
                width: 90%;
                height: 2rem;
                margin-left: 2rem;
                font-weight: lighter;
            }

            .add {
                display: block;
                margin: auto;
                width: 90%;
                background-color:rgb(30, 138, 210);
                border: none;
                height: 2.5rem;
                border-radius: 0.5rem;
                color: white;
            }

            .centering {
                display: flex;
                align-content: center;
                height: 100vh;
            }

            .star {
                display: flex;
                align-items: left;
                color: white;
            }

            .star input {
                display: none;
                font-size: 100px;
            }

            .star-custom {
                color: rgb(255, 234, 0);
            }

            .star input + label {
                font-size: 30px;
                cursor: pointer;
            }

            .star input:checked + label ~ label {
                color: grey;
            }

            .listdisp {
                width: 90%;
                margin: auto;
            }

            .header {
            background-color: rgb(59, 145, 167);
            color: white;
            font-weight: bold;
            width: 100%;
            padding-left: 2%;
          }
          
          a {
            text-decoration: none;
          }

          .dropdown-content a {
            color: black;
            text-decoration: none;
            display: block;
          }

          .dropbtn {
              background-color: rgb(94, 179, 200);
              color: white;
              padding-left: 30.35rem;
              padding-right: 30.35rem;
              padding-top: 16px;
              padding-bottom: 16px;
              font-size: 16px;
              border: none;
          }
          
          .dropdown {
            position: relative;
            display: inline-block;
          }

          .dropdown-content {
              display: none;
              position: absolute;
              background-color: rgb(255, 255, 255);
              min-width: 110px;
              z-index: 1;
          }

          .dropdown-content a {
            color: black;
            padding-left: 30.23rem;
            padding-right: 30.23rem;
            padding-top: 16px;
            padding-bottom: 16px;
            text-decoration: none;
            display: block;
          }

        .dropdown:hover .dropdown-content {display: block;}
        .dropdown-content a:hover {background-color: #e4e8ea;}

        </style>
    </head>

    <body>
        <h1 class="header">1st Graded Exercise</h1>

        <div class="dropdown">
          <button class="dropbtn">Home</button>
          <div class="dropdown-content">
            <a href="../../index.html">Return</a>
          </div>
        </div>

        <div class="dropdown">
            <button class="dropbtn">Q4</button>
            <div class="dropdown-content">
              <a href="#">GT2</a>
            </div>
          </div>

        <form id="dForm">
            <div class="centering">
                <fieldset>
                    <h3>Add A Movie</h3>
                    <label>Title </br> <input type="text" id="title"></label> </br></br>
                    <label>Year </br> <input type="text" id="year"></label> </br></br>
                    <label>Genre </br> 
                        <select name="Genre" id="genre">
                            <option value="" disabled selected hidden>Select genre...</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Romance">Romance</option>
                            <option value="Action">Action</option>
                            <option value="Scifi">Science Fiction</option>
                            <option value="Mysery">Mystery</option>
                            <option value="Drama">Drama</option>
                        </select>
                    </label> </br></br>
                    
                    <label>Rating</label></br></br>
                    <div class="container">
                        <div class="star">
                            <input type="radio" name="rating" id="1" value="1">
                            <label for="1" class="fa fa-star star-custom"></label>
                            <input type="radio" name="rating" id="2" value="2">
                            <label for="2" class="fa fa-star star-custom"></label>
                            <input type="radio" name="rating" id="3" value="3">
                            <label for="3" class="fa fa-star star-custom"></label>
                            <input type="radio" name="rating" id="4" value="4">
                            <label for="4" class="fa fa-star star-custom"></label>
                            <input type="radio" name="rating" id="5" value="5">
                            <label for="5" class="fa fa-star star-custom"></label>
                        </div>
                    </div></br></br>

                    <button type="submit" class="add">Add Movie</button>
                    
                    <h3>Movie List</h3>

                    <fieldset class="listdisp">
                        <div id="listMovies"></div>
                        <script src="script.js"></script>
                    </fieldset>
                </fieldset>
            </div>
        </form>
    </body>
</html>
