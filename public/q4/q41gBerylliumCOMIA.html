<!DOCTYPE html>
<html>
    <head>
        <title>Q4 1st Graded</title>
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="1st Graded Exercise">
        <meta name="keywords" content="Movie Rating">
        <meta name="author" content="HA Comia">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            label {
                font-weight: bold;
                margin-left: 2rem;
                color:rgb(61, 61, 61);
            }

            fieldset  {
                width: 50%;
                margin: auto;
                margin-top: 5rem;
            }

            h3 {
                font-weight: bold;
                text-align: center
            }

            input  {
                width: 90%;
                margin-left: 2rem;
                font-weight: lighter;
            }

            select {
                width: 90%;
                height: 2rem;
                margin-left: 2rem;
                font-weight: lighter;
            }

            .addmovie {
                display: block;
                margin: auto;
                width: 90%;
                background-color:rgb(30, 138, 210);
                border: none;
                height: 2.5rem;
                border-radius: 0.5rem;
                color: white;
            }

            .centering {
                display: flex;
                align-content: center;
                min-height: 100vh;
            }

            .stars {
                display: flex;
                gap: 5px;
                margin-bottom: 15px;
            }

            .star {
                font-size: 28px;
                color: lightgray;
                cursor: pointer;
                transition: color 0.2s;
            }

            .star:hover,
            .star.selected {
                color: gold;
            }

            .rating-display {
                color: gold;
                font-size: 20px;
                margin-left: 5px;
            }

            .movie-container {
                border: 1px solid rgb(137, 137, 137);
                padding: 1rem;
                margin-bottom: 1rem;
                width: 40rem;
            }

            .star input + label {
                font-size: 30px;
                cursor: pointer;
            }

            .centering-h {
                display: flex;
                justify-content: center;
            }

            body {
                padding-bottom: 5rem;
            }

            .delete-btn {
                margin-left: 2rem;
            }

            .header {
            background-color: rgb(59, 145, 167);
            color: white;
            font-weight: bold;
            width: 100%;
            padding-left: 2%;
          }
          
          a {
            text-decoration: none;
          }

          .dropdown-content a {
            color: black;
            text-decoration: none;
            display: block;
          }

          .dropbtn {
              background-color: rgb(94, 179, 200);
              color: white;
              padding-left: 30.35rem;
              padding-right: 30.35rem;
              padding-top: 16px;
              padding-bottom: 16px;
              font-size: 16px;
              border: none;
          }
          
          .dropdown {
            position: relative;
            display: inline-block;
          }

          .dropdown-content {
              display: none;
              position: absolute;
              background-color: rgb(255, 255, 255);
              min-width: 110px;
              z-index: 1;
          }

          .dropdown-content a {
            color: black;
            padding-left: 30.23rem;
            padding-right: 30.23rem;
            padding-top: 16px;
            padding-bottom: 16px;
            text-decoration: none;
            display: block;
          }

        .dropdown:hover .dropdown-content {display: block;}
        .dropdown-content a:hover {background-color: #e4e8ea;}

        </style>
    </head>

    <body>
        <h1 class="header">1st Graded Exercise</h1>

        <div class="dropdown">
          <button class="dropbtn">Home</button>
          <div class="dropdown-content">
            <a href="../../index.html">Return</a>
          </div>
        </div>

        <div class="dropdown">
            <button class="dropbtn">Q4</button>
            <div class="dropdown-content">
              <a href="#">GT2</a>
            </div>
          </div>

        <form id="dForm">
            <div class="centering">
                <fieldset>
                    </br>
                    <h3>Add / Update A Movie Rating</h3>
                    <label>Title </br> <input type="text" id="title"></label> </br></br>
                    <label>Year </br> <input type="text" id="year"></label> </br></br>
                    <label>Genre </br> 
                        <select name="Genre" id="genre">
                            <option value="" disabled selected hidden>Select genre...</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Romance">Romance</option>
                            <option value="Action">Action</option>
                            <option value="Scifi">Science Fiction</option>
                            <option value="Mysery">Mystery</option>
                            <option value="Drama">Drama</option>
                        </select>
                    </label> </br></br>
                    
                    <label>Rating: </label></br></br>
                    <div style="margin-left: 2rem">
                        <div class="stars" id="ratingStars">
                            <span class="star" data-value="1">&#9733;</span>
                            <span class="star" data-value="2">&#9733;</span>
                            <span class="star" data-value="3">&#9733;</span>
                            <span class="star" data-value="4">&#9733;</span>
                            <span class="star" data-value="5">&#9733;</span>
                        </div>
                    </div>
                    </br>

                    <button class="addmovie" type="submit">Add Movie</button> </br>
                    
                    <h3>Movie List</h3> </br>

                    <div class="centering-h">
                        <div id="listMovies"></div>
                        <script src="script.js"></script>
                    </div>
                </fieldset>
            </div>
        </form>
    </body>
</html>
